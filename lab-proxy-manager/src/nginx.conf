server {
    listen 3000;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://webserver:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Api-Key $http_x_api_key;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
